abstract=The CELINE Core Ontology is a lightweight orchestration profile for Renewable Energy Communities (RECs) and Digital Twin workflows. It connects established standards — PECO, SAREF, SAREF4ENER, SOSA/SSN and BIGG — without redefining their domain semantics, providing a minimal coordination layer for simulation scenarios, dataset references and KPI evaluation within the CELINE platform.

introduction=CELINE (Cross-sectorial integrated digital services Enabling energy Localized INnovation and community Empowerment) is a Horizon Europe research project (Grant Agreement No. 101160667) that develops a Digital Toolbox for households, energy communities and cooperative organisations to optimise energy management and support investment decisions around photovoltaic systems, battery storage, electric vehicles and heat pumps. The project validates its solutions across three European demonstration sites in Spain, Finland and Italy.\n\nThe CELINE Core Ontology supports the semantic layer of this toolbox. It is a thin orchestration profile — not a standalone domain ontology — that binds together existing standards into a coherent semantic target for the CELINE ecosystem:\n\n- **PECO** (https://purl.org/peco) models the Energy Community structure.\n- **SAREF / SAREF4ENER** (ETSI) covers smart devices and energy assets.\n- **SOSA/SSN** (W3C) covers sensor observations and measurements.\n- **BIGG** (BeeGroup/CIMNE) provides KPI definitions for building and community energy performance.\n\nThe ontology introduces only the glue concepts needed to coordinate these standards within CELINE: CommunityContext, Scenario, Simulation, SimulationRun, DatasetReference and KPIEvaluation. All cross-cutting links — to energy communities, devices, observations and KPIs — are expressed via lightweight object properties that reference terms from the imported vocabularies.\n\nProject website: https://www.celineproject.eu/\nSource code and issues: https://github.com/celine-eu\nDocumentation: https://celine-eu.github.io/

description=The ontology defines six classes coordinating the CELINE semantic stack:\n\n- **CommunityContext** binds a PECO EnergyCommunity to its assets, datasets and simulations.\n- **Scenario** captures assumptions, temporal scope and configuration for one or more simulation runs.\n- **Simulation** is the abstract definition of a simulation, independent of execution.\n- **SimulationRun** is a concrete execution of a Simulation under a specific Scenario, referencing input/output datasets, SOSA observations and KPI evaluations.\n- **DatasetReference** is a lightweight pointer to an external dataset; CELINE does not define dataset schemas.\n- **KPIEvaluation** records the result of evaluating a BIGG KPI within a SimulationRun or Scenario.\n\nAll cross-domain links — to energy communities (PECO), devices (SAREF), observations (SOSA) and performance indicators (BIGG) — are expressed via object properties that reference terms from the imported vocabularies directly, without subclassing or redefining them.

