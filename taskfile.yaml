version: "3"

tasks:
  release:
    cmds:
      - uv run semantic-release -v version --no-vcs-release
      - git push
      - git push --tags

  docs:widoco:
    desc: "Generate WIDOCO HTML docs for a spec version (default: latest). Pass version as: task docs:widoco -- vX.X"
    vars:
      VERSION:
        sh: |
          if [ -n "{{.CLI_ARGS}}" ]; then
            echo "{{.CLI_ARGS}}"
          else
            ls -d specs/*/ 2>/dev/null \
              | sed 's:/*$::' \
              | grep -v current \
              | sort -V \
              | tail -n 1 \
              | xargs basename
          fi
    cmds:
      - |
        set -e
        version="{{.VERSION}}"
        input="specs/$version/celine.ttl"
        output="releases/$version"

        if [ ! -f "$input" ]; then
          echo "Ontology file not found: $input"
          exit 1
        fi

        echo "Generating WIDOCO docs for $version..."
        rm -rf "$output"
        mkdir -p "$output"

        conf_flag=""
        if [ -f "specs/$version/widoco.conf" ]; then
          conf_flag="-confFile /usr/local/widoco/in/widoco.conf"
        fi

        cid=$(docker create \
          -v "$(pwd)/specs/$version:/usr/local/widoco/in:ro" \
          ghcr.io/dgarijo/widoco:v1.4.23 \
          -ontFile /usr/local/widoco/in/celine.ttl \
          -outFolder /tmp/out \
          -rewriteAll \
          -lang en \
          -includeAnnotationProperties \
          $conf_flag)

        docker start --attach "$cid"
        docker cp "$cid:/tmp/out/." "$output/"
        docker rm "$cid"

        echo "Docs generated at $output"

        if [ -f "specs/$version/README.md" ]; then
          cp "specs/$version/README.md" "$output/readme.md"
          echo "Copied specs/$version/README.md → $output/readme.md"
        fi

  release:ontology:
    desc: Copy latest versioned spec into specs/current
    cmds:
      - |
        set -e
        echo "Detecting latest spec..."

        latest_dir=$(ls -d specs/*/ 2>/dev/null \
          | sed 's:/*$::' \
          | grep -v current \
          | sort -V \
          | tail -n 1)

        if [ -z "$latest_dir" ]; then
          echo "No spec directories found under specs/"
          exit 1
        fi

        latest=$(basename "$latest_dir")

        rm -rf specs/current
        cp -r "specs/$latest" specs/current
        echo "Copied specs/$latest → specs/current"

        git add .
        git commit -m "release ontology $latest" || true

        git tag -f "celine-ontology-$latest"
        git push -f
